<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="4K GAME">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/favicon-192x192.png">
    <title>正在跳转...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>正在跳转到安装页面...</p>
    </div>

    <script>
        console.log("=== index.html 自动跳转 ===");
        console.log("当前URL:", window.location.href);
        console.log("User Agent:", navigator.userAgent);

        // 检测是否iOS设备
        function isIOSDevice() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
        }

        // 获取URL参数
        const params = window.location.search;
        console.log("URL参数:", params);

        // 根据设备类型跳转
        if (isIOSDevice()) {
            const targetUrl = './ios-guide.html' + params;
            console.log("检测到iOS设备，跳转到:", targetUrl);
            window.location.href = targetUrl;
        } else {
            const targetUrl = './install.html' + params;
            console.log("非iOS设备，跳转到:", targetUrl);
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
