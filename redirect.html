<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>loading...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            text-align: center;
            font-size: 16px;
            color: #888;
        }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #6BECA9;
            color: #000;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        .retry-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">loading...</div>
    <button class="retry-btn" id="retryBtn" onclick="redirectToGame()">重试</button>

    <script>
        console.log("=== redirect.html 快速加载模式 ===");
        console.log("当前时间:", new Date().toISOString());

        // 渠道ID
        const channelId = new URLSearchParams(window.location.search).get('channel_id') || '10001';

        // 本地缓存key
        const CACHE_KEY = 'last_working_domain';
        const CACHE_TIMESTAMP_KEY = 'last_working_domain_time';
        const CACHE_VALID_DURATION = 24 * 60 * 60 * 1000; // 24小时有效期

        // 备用域名列表（按优先级排序）
        const FALLBACK_DOMAINS = [
            'https://7p.game',
            'https://4k.game',
            'https://777grand.xpthirty.click',
            'https://777grand.xptirty2.click',
            'https://777grand.com'
        ];

        // API域名列表
        const API_DOMAINS = [
            'https://api.4k.game',
            'https://api2.4k.game'
        ];

        // 超时时间（毫秒）- 缩短到1.5秒
        const TIMEOUT = 1500;

        // 获取缓存的域名
        function getCachedDomain() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);

                if (cached && timestamp) {
                    const age = Date.now() - parseInt(timestamp);
                    if (age < CACHE_VALID_DURATION) {
                        console.log('✅ 使用缓存域名:', cached, '(缓存时间:', Math.floor(age / 1000 / 60), '分钟前)');
                        return cached;
                    } else {
                        console.log('⚠️ 缓存已过期，清除缓存');
                        localStorage.removeItem(CACHE_KEY);
                        localStorage.removeItem(CACHE_TIMESTAMP_KEY);
                    }
                }
            } catch (e) {
                console.error('读取缓存失败:', e);
            }
            return null;
        }

        // 保存域名到缓存
        function cacheDomain(domain) {
            try {
                localStorage.setItem(CACHE_KEY, domain);
                localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now().toString());
                console.log('💾 缓存域名:', domain);
            } catch (e) {
                console.error('保存缓存失败:', e);
            }
        }

        // 快速检测域名是否可用（尝试实际访问）
        async function checkDomainFast(domain) {
            const startTime = Date.now();
            try {
                // 尝试访问一个轻量级的资源（favicon或根路径）
                const testUrl = domain + '/favicon.ico?t=' + Date.now();
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

                const response = await fetch(testUrl, {
                    method: 'GET',
                    cache: 'no-store',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const elapsed = Date.now() - startTime;

                // 检查状态码：200-399为成功，403/404等为失败
                if (response.ok || response.status === 404) {
                    // 404也算可用，因为说明服务器在线，只是资源不存在
                    console.log(`✅ 域名可用: ${domain} (${response.status}, ${elapsed}ms)`);
                    return true;
                } else {
                    console.log(`❌ 域名返回错误: ${domain} (${response.status}, ${elapsed}ms)`);
                    return false;
                }
            } catch (e) {
                const elapsed = Date.now() - startTime;
                console.log(`❌ 域名不可用: ${domain} (${elapsed}ms)`, e.message);
                return false;
            }
        }

        // 并行检测多个域名，返回第一个可用的
        async function findFirstWorkingDomain(domains) {
            console.log('🔍 并行检测域名:', domains);

            return new Promise((resolve) => {
                let resolved = false;
                let checkedCount = 0;

                domains.forEach(async (domain) => {
                    const isWorking = await checkDomainFast(domain);
                    checkedCount++;

                    if (isWorking && !resolved) {
                        resolved = true;
                        resolve(domain);
                    } else if (checkedCount === domains.length && !resolved) {
                        resolve(null);
                    }
                });
            });
        }

        // 从API获取游戏URL
        async function fetchGameUrlFromApi(domain) {
            const startTime = Date.now();
            try {
                const url = `${domain}/api/getGameUrl?channel_id=${channelId}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

                const response = await fetch(url, {
                    signal: controller.signal,
                    mode: 'cors',
                    credentials: 'include'
                });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 0 && result.data && result.data.h5_link) {
                        const elapsed = Date.now() - startTime;
                        console.log(`✅ API返回域名: ${result.data.h5_link} (${elapsed}ms)`);
                        return result.data.h5_link;
                    }
                }
            } catch (error) {
                const elapsed = Date.now() - startTime;
                console.log(`❌ API请求失败 (${domain}): ${error.message} (${elapsed}ms)`);
            }
            return null;
        }

        // 主逻辑：快速获取可用域名
        async function getWorkingDomain() {
            const statusEl = document.getElementById('status');

            // 策略1：优先使用缓存的域名
            statusEl.textContent = '正在连接...';
            const cachedDomain = getCachedDomain();
            if (cachedDomain) {
                const isWorking = await checkDomainFast(cachedDomain);
                if (isWorking) {
                    console.log('🚀 使用缓存域名，直接跳转');
                    return cachedDomain;
                } else {
                    console.log('⚠️ 缓存域名不可用，尝试其他方式');
                }
            }

            // 策略2：并行检测备用域名列表
            statusEl.textContent = '正在查找服务器...';
            const workingDomain = await findFirstWorkingDomain(FALLBACK_DOMAINS);
            if (workingDomain) {
                console.log('🚀 找到可用备用域名:', workingDomain);
                cacheDomain(workingDomain);
                return workingDomain;
            }

            // 策略3：从API获取最新域名
            statusEl.textContent = '正在获取最新地址...';
            for (const apiDomain of API_DOMAINS) {
                const gameUrl = await fetchGameUrlFromApi(apiDomain);
                if (gameUrl) {
                    // 提取域名部分
                    try {
                        const url = new URL(gameUrl);
                        const domain = url.origin;
                        console.log('🚀 API返回域名:', domain);
                        cacheDomain(domain);
                        return gameUrl; // 返回完整URL
                    } catch (e) {
                        console.error('解析API返回的URL失败:', e);
                    }
                }
            }

            return null;
        }

        // 跳转到游戏
        async function redirectToGame() {
            const statusEl = document.getElementById('status');
            const retryBtn = document.getElementById('retryBtn');

            retryBtn.style.display = 'none';

            const startTime = Date.now();
            const targetUrl = await getWorkingDomain();
            const elapsed = Date.now() - startTime;

            if (targetUrl) {
                // 构建完整URL
                let finalUrl = targetUrl;
                if (!targetUrl.includes('?')) {
                    finalUrl += `/index.html?channel_id=${channelId}`;
                } else if (!targetUrl.includes('channel_id')) {
                    finalUrl += `&channel_id=${channelId}`;
                }

                console.log(`🎮 准备跳转到游戏 (总耗时: ${elapsed}ms)`);
                console.log('目标URL:', finalUrl);
                statusEl.textContent = 'loading...';

                setTimeout(() => {
                    if (window.matchMedia('(display-mode: standalone)').matches) {
                        window.location.replace(finalUrl);
                    } else {
                        window.location.href = finalUrl;
                    }
                }, 300);
            } else {
                console.error(`❌ 所有域名都不可用 (总耗时: ${elapsed}ms)`);
                statusEl.innerHTML = '无法连接到服务器<br>请检查网络后重试';
                retryBtn.style.display = 'block';
            }
        }

        // 页面加载后立即执行
        window.addEventListener('load', redirectToGame);
    </script>
</body>
</html>
