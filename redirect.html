<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在进入游戏...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            text-align: center;
            font-size: 16px;
            color: #888;
        }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #6BECA9;
            color: #000;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        .retry-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">正在获取服务器地址...</div>
    <button class="retry-btn" id="retryBtn" onclick="redirectToGame()">重试</button>

    <script>
        // ============================================
        // 配置项
        // ============================================

        // 渠道ID（从URL参数获取，默认10001）
        const channelId = new URLSearchParams(window.location.search).get('channel_id') || '10001';

        // 你的游戏后台API域名列表（按优先级排序）
        // 第一个是主要的，当第一个不可用时会自动切换到下一个
        const API_DOMAINS = [
            'https://api.4k.game',
            'https://api2.4k.game',
            'https:// phecda-backend.your-domain.com'  // 替换为实际域名
        ];

        // 游戏页面域名列表（备用，当API全部失败时使用）
        const GAME_DOMAINS = [
            'https://4k.game',
            'https://4k2.game',
            'https://new.4k.game'
        ];

        // 跳转超时时间（毫秒）
        const TIMEOUT = 5000;

        // ============================================
        // 核心逻辑
        // ============================================

        // 尝试从API获取游戏URL
        async function fetchGameUrlFromApi(domain) {
            const url = `${domain}/api/getGameUrl?channel_id=${channelId}`;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

            try {
                const response = await fetch(url, {
                    signal: controller.signal,
                    mode: 'cors',
                    credentials: 'include'
                });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 0 && result.data && result.data.h5_link) {
                        return result.data.h5_link;
                    }
                }
            } catch (error) {
                console.log(`⚠️ API请求失败 (${domain}):`, error.message);
            }
            return null;
        }

        // 尝试获取所有API域名，返回第一个成功的
        async function getGameUrlFromApi() {
            for (const domain of API_DOMAINS) {
                const url = await fetchGameUrlFromApi(domain);
                if (url) {
                    console.log('✅ 从API获取到游戏地址:', url);
                    return url;
                }
            }
            return null;
        }

        // 简单检测域名是否可用（使用no-cors模式）
        async function checkDomainAvailable(domain) {
            try {
                const testUrl = domain + '/?t=' + Date.now();
                await fetch(testUrl, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    cache: 'no-store'
                });
                return true;
            } catch (e) {
                return false;
            }
        }

        // 从游戏域名列表中选择一个可用的
        async function getFallbackGameUrl() {
            for (const domain of GAME_DOMAINS) {
                const available = await checkDomainAvailable(domain);
                if (available) {
                    console.log('✅ 使用备用游戏域名:', domain);
                    return domain + `/index.html?channel_id=${channelId}`;
                }
            }
            // 兜底：使用当前域名
            return window.location.origin + window.location.pathname;
        }

        async function redirectToGame() {
            const statusEl = document.getElementById('status');
            const retryBtn = document.getElementById('retryBtn');

            statusEl.textContent = '正在获取服务器地址...';
            retryBtn.style.display = 'none';

            let targetUrl = null;

            // 方法1：从API获取最新域名（优先）
            statusEl.textContent = '正在连接服务器...';
            targetUrl = await getGameUrlFromApi();

            // 方法2：如果所有API都失败，使用备用游戏域名
            if (!targetUrl) {
                statusEl.textContent = '正在尝试备用服务器...';
                targetUrl = await getFallbackGameUrl();
            }

            // 执行跳转
            if (targetUrl) {
                // 保留URL参数（channel_id等）
                const params = window.location.search;
                const finalUrl = targetUrl + (params || '');

                statusEl.textContent = '正在进入游戏...';

                setTimeout(() => {
                    if (window.matchMedia('(display-mode: standalone)').matches) {
                        window.location.replace(finalUrl);
                    } else {
                        window.location.href = finalUrl;
                    }
                }, 500);
            } else {
                statusEl.innerHTML = '无法连接到服务器<br>请检查网络后重试';
                retryBtn.style.display = 'block';
            }
        }

        // 页面加载后自动执行
        window.addEventListener('load', redirectToGame);
    </script>
</body>
</html>
