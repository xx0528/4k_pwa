<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>loading...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            text-align: center;
            font-size: 16px;
            color: #888;
        }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #6BECA9;
            color: #000;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        .retry-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">loading...</div>
    <button class="retry-btn" id="retryBtn" onclick="redirectToGame()">Retry</button>

    <script>
        console.log("=== redirect.html Fast Loading Mode ===");
        console.log("Current time:", new Date().toISOString());

        // 渠道ID
        const channelId = new URLSearchParams(window.location.search).get('channel_id') || '10001';

        // 本地缓存key
        const CACHE_KEY = 'last_working_domain';
        const CACHE_TIMESTAMP_KEY = 'last_working_domain_time';
        const CACHE_VALID_DURATION = 24 * 60 * 60 * 1000; // 24小时有效期

        // 备用域名列表（按优先级排序）
        const FALLBACK_DOMAINS = [
            'https://ios.sigame.cc',
            'https://ios.fbifgm6.cc',
            'https://ios.hbifgm6.vip',
            'https://ios.pp03k.cc',
            'https://ios.pp03k.vip'
        ];

        // API域名列表
        const API_DOMAINS = [
            'https://api.4k.game',
            'https://api2.4k.game'
        ];

        // 超时时间（毫秒）- 缩短到1.5秒
        const TIMEOUT = 1500;

        // 获取缓存的域名
        function getCachedDomain() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);

                if (cached && timestamp) {
                    const age = Date.now() - parseInt(timestamp);
                    if (age < CACHE_VALID_DURATION) {
                        console.log('✅ Using cached domain:', cached, '(cached:', Math.floor(age / 1000 / 60), 'minutes ago)');
                        return cached;
                    } else {
                        console.log('⚠️ Cache expired, clearing cache');
                        localStorage.removeItem(CACHE_KEY);
                        localStorage.removeItem(CACHE_TIMESTAMP_KEY);
                    }
                }
            } catch (e) {
                console.error('读取缓存失败:', e);
            }
            return null;
        }

        // 保存域名到缓存
        function cacheDomain(domain) {
            try {
                localStorage.setItem(CACHE_KEY, domain);
                localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now().toString());
                console.log('💾 Caching domain:', domain);
            } catch (e) {
                console.error('保存缓存失败:', e);
            }
        }

        // 快速检测域名是否可用（使用no-cors模式）
        async function checkDomainFast(domain) {
            const startTime = Date.now();
            try {
                // Use no-cors mode, although unable to read status code, can detect network connectivity
                const testUrl = domain + '/?t=' + Date.now();
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

                await fetch(testUrl, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    cache: 'no-store',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const elapsed = Date.now() - startTime;
                console.log(`✅ Domain responding: ${domain} (${elapsed}ms)`);
                return true;
            } catch (e) {
                const elapsed = Date.now() - startTime;
                console.log(`❌ Domain not responding: ${domain} (${elapsed}ms)`, e.message);
                return false;
            }
        }

        // 并行检测多个域名，返回第一个可用的
        async function findFirstWorkingDomain(domains) {
            console.log('🔍 Checking domains in parallel:', domains);

            return new Promise((resolve) => {
                let resolved = false;
                let checkedCount = 0;

                domains.forEach(async (domain) => {
                    const isWorking = await checkDomainFast(domain);
                    checkedCount++;

                    if (isWorking && !resolved) {
                        resolved = true;
                        resolve(domain);
                    } else if (checkedCount === domains.length && !resolved) {
                        resolve(null);
                    }
                });
            });
        }

        // 从API获取游戏URL
        async function fetchGameUrlFromApi(domain) {
            const startTime = Date.now();
            try {
                const url = `${domain}/api/getGameUrl?channel_id=${channelId}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

                const response = await fetch(url, {
                    signal: controller.signal,
                    mode: 'cors',
                    credentials: 'include'
                });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 0 && result.data && result.data.h5_link) {
                        const elapsed = Date.now() - startTime;
                        console.log(`✅ API returned domain: ${result.data.h5_link} (${elapsed}ms)`);
                        return result.data.h5_link;
                    }
                }
            } catch (error) {
                const elapsed = Date.now() - startTime;
                console.log(`❌ API request failed (${domain}): ${error.message} (${elapsed}ms)`);
            }
            return null;
        }

        // 主逻辑：快速获取可用域名
        async function getWorkingDomain() {
            const statusEl = document.getElementById('status');

            // 策略1：优先使用缓存的域名（直接跳转，不检测）
            statusEl.textContent = 'loading...';
            const cachedDomain = getCachedDomain();
            if (cachedDomain) {
                console.log('🚀 Using cached domain, redirecting directly (no check)');
                return cachedDomain;
            }

            // 策略2：并行检测备用域名列表
            statusEl.textContent = 'loading...';
            const workingDomain = await findFirstWorkingDomain(FALLBACK_DOMAINS);
            if (workingDomain) {
                console.log('🚀 Found working fallback domain:', workingDomain);
                cacheDomain(workingDomain);
                return workingDomain;
            }

            // 策略3：从API获取最新域名
            statusEl.textContent = 'loading...';
            for (const apiDomain of API_DOMAINS) {
                const gameUrl = await fetchGameUrlFromApi(apiDomain);
                if (gameUrl) {
                    // 提取域名部分
                    try {
                        const url = new URL(gameUrl);
                        const domain = url.origin;
                        console.log('🚀 API returned domain:', domain);
                        cacheDomain(domain);
                        return gameUrl; // 返回完整URL
                    } catch (e) {
                        console.error('解析API返回的URL失败:', e);
                    }
                }
            }

            return null;
        }

        // 跳转到游戏
        async function redirectToGame() {
            const statusEl = document.getElementById('status');
            const retryBtn = document.getElementById('retryBtn');

            retryBtn.style.display = 'none';

            const startTime = Date.now();
            const targetUrl = await getWorkingDomain();
            const elapsed = Date.now() - startTime;

            if (targetUrl) {
                // 构建完整URL
                let finalUrl = targetUrl;
                if (!targetUrl.includes('?')) {
                    finalUrl += `/index.html?channel_id=${channelId}`;
                } else if (!targetUrl.includes('channel_id')) {
                    finalUrl += `&channel_id=${channelId}`;
                }

                console.log(`🎮 Preparing to redirect to game (total time: ${elapsed}ms)`);
                console.log('Target URL:', finalUrl);
                statusEl.textContent = 'loading...';

                setTimeout(() => {
                    if (window.matchMedia('(display-mode: standalone)').matches) {
                        window.location.replace(finalUrl);
                    } else {
                        window.location.href = finalUrl;
                    }
                }, 300);
            } else {
                console.error(`❌ All domains unavailable (total time: ${elapsed}ms)`);
                statusEl.innerHTML = 'Unable to connect to server<br>Please check your network and retry';
                retryBtn.style.display = 'block';
            }
        }

        // 页面加载后立即执行
        window.addEventListener('load', redirectToGame);
    </script>
</body>
</html>
