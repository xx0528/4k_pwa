<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>loading...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            text-align: center;
            font-size: 16px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">enter game ...</div>

    <script>
        // ============================================
        // 配置项（在这里修改游戏域名）
        // ============================================

        // 游戏域名列表（按优先级排序，第一个是当前使用的，失败后自动切换下一个）
        const GAME_DOMAINS = [
            'https://7p.game',    // 当前使用的域名
            'https://4u.game'     // 备用域名
        ];

        // 渠道ID
        const channelId = new URLSearchParams(window.location.search).get('channel_id') || '10001';

        // ============================================
        // 核心逻辑
        // ============================================

        // 检测域名是否可用
        async function checkDomain(domain) {
            try {
                await fetch(domain + '/?t=' + Date.now(), {
                    method: 'HEAD',
                    mode: 'no-cors',
                    cache: 'no-store'
                });
                return true;
            } catch (e) {
                return false;
            }
        }

        // 找到第一个可用的域名
        async function findAvailableDomain() {
            for (const domain of GAME_DOMAINS) {
                const available = await checkDomain(domain);
                if (available) {
                    console.log('✅ 使用域名:', domain);
                    return domain;
                }
                console.log('❌ 域名不可用:', domain);
            }
            // 全部失败，使用第一个（碰碰运气）
            return GAME_DOMAINS[0];
        }

        // 跳转
        async function redirectToGame() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = '正在连接游戏...';

            const domain = await findAvailableDomain();
            const targetUrl = `${domain}/index.html?channel_id=${channelId}`;

            statusEl.textContent = '正在进入游戏...';
            window.location.href = targetUrl;
        }

        // 自动执行
        redirectToGame();
    </script>
</body>
</html>
