<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>loading...</title>
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #6BECA9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            text-align: center;
            font-size: 16px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">enter game ...</div>

    <script>
        console.log('[PWA Redirect] ====== PWA Redirect ======');

        // ============================================
        // 配置项（在这里修改游戏域名）
        // ============================================

        // 游戏域名列表 - 直接使用第一个，不需要检测
        const GAME_DOMAINS = [
            'https://7p.game',
            'https://4u.game'
        ];

        console.log('[PWA Redirect] GAME_DOMAINS:', GAME_DOMAINS);

        // 渠道ID
        const urlParams = new URLSearchParams(window.location.search);
        const channelId = urlParams.get('channel_id') || '10001';
        console.log('[PWA Redirect] channelId:', channelId);
        console.log('[PWA Redirect] URL:', window.location.href);

        // 直接使用第一个域名
        const targetDomain = GAME_DOMAINS[0];
        const targetUrl = `${targetDomain}/index.html?channel_id=${channelId}`;

        console.log('[PWA Redirect] 跳转地址:', targetUrl);

        // 跳转
        const statusEl = document.getElementById('status');
        statusEl.textContent = '进入游戏...';

        // 延迟1秒跳转，让日志显示出来
        setTimeout(() => {
            console.log('[PWA Redirect] 执行跳转...');
            window.location.href = targetUrl;
        }, 1500);
    </script>
</body>
</html>
